apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-nodejs-app
  namespace: cicd-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo-nodejs-app

  template:
    metadata:
      labels:
        app: demo-nodejs-app

    spec:
      containers:
        - name: demo-nodejs-app
          image: IMAGE_URI_PLACEHOLDER
          ports:
            - containerPort: 3000