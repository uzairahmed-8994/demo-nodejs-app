apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-nodejs-app
  labels:
    app: demo-nodejs-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo-nodejs-app

  template:
    metadata:
      labels:
        app: demo-nodejs-app

    spec:
      containers:
        - name: demo-nodejs-app
          image: 433154992048.dkr.ecr.us-east-1.amazonaws.com/postex-logistics-prod-api:latest
          ports:
            - containerPort: 3000